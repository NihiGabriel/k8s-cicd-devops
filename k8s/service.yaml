apiVersion: v1
kind: Service
metadata:
  name: k8s-cicd-devops-service
spec:
  selector:
    app: k8s-cicd-devops             # Must match the label in deployment.yaml
  type: NodePort                   # Exposes the app outside the cluster
  ports:
    - protocol: TCP
      port: 80                     # Port inside the cluster
      targetPort: 3000             # Port your container listens on
      nodePort: 30080              # Port on your local machine (30000–32767)
